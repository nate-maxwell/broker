name: Run Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  discover-environments:
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.tox-environments.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tox
        run: python -m pip install tox

      - name: Read tox environments
        id: tox-environments
        shell: pwsh
        run: |
          $matrix = @(
            python -m tox list --no-desc -d | ForEach-Object {
              if ($_ -notmatch '^py(?<major>\d)(?<minor>\d+)$') {
                throw "Cannot determine a Python version from tox environment '$_'."
              }

              @{
                tox = $_
                python = "$($Matches.major).$($Matches.minor)"
              }
            }
          ) | ConvertTo-Json -Compress

          "matrix=$matrix" >> $env:GITHUB_OUTPUT

  test:
    needs: discover-environments
    name: ${{ matrix.tox }} (Python ${{ matrix.python }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-environments.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install tox
        run: python -m pip install tox

      - name: Run ${{ matrix.tox }}
        env:
          TOX_ENV: ${{ matrix.tox }}
        run: python -m tox run -e $env:TOX_ENV
