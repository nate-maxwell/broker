name: Run Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  discover-environments:
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.tox-environments.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tox
        run: python -m pip install tox

      - name: Read tox environments
        id: tox-environments
        shell: pwsh
        run: |
          $matrix = @(
            python -m tox list --no-desc -d | ForEach-Object {
              if ($_ -notmatch '^py(?<major>\d)(?<minor>\d+)$') {
                throw "Cannot determine a Python version from tox environment '$_'."
              }

              @{
                tox = $_
                python = "$($Matches.major).$($Matches.minor)"
              }
            }
          ) | ConvertTo-Json -Compress

          "matrix=$matrix" >> $env:GITHUB_OUTPUT

  tox:
    needs: discover-environments
    name: ${{ matrix.tox }} (Python ${{ matrix.python }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-environments.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install tox
        run: python -m pip install tox

      - name: Run ${{ matrix.tox }}
        env:
          TOX_ENV: ${{ matrix.tox }}
        run: python -m tox run -e $env:TOX_ENV

  mypy:
    name: mypy
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tox
        run: python -m pip install tox

      - name: Run mypy
        run: python -m tox run -e mypy

  test:
    name: test
    if: ${{ always() }}
    needs: [discover-environments, tox, mypy]
    runs-on: windows-latest

    steps:
      - name: Verify all tox environments passed
        shell: pwsh
        env:
          DISCOVERY_RESULT: ${{ needs.discover-environments.result }}
          TOX_RESULT: ${{ needs.tox.result }}
          MYPY_RESULT: ${{ needs.mypy.result }}
        run: |
          if (
            $env:DISCOVERY_RESULT -ne 'success' -or
            $env:TOX_RESULT -ne 'success' -or
            $env:MYPY_RESULT -ne 'success'
          ) {
            throw "Test suite did not pass. Discovery: $env:DISCOVERY_RESULT; tox: $env:TOX_RESULT; mypy: $env:MYPY_RESULT"
          }
