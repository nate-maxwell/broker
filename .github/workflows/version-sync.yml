name: Sync Version Files

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: version-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Sync version files
        shell: pwsh
        run: |
          python release.py

      - name: Commit sync to PR branch
        shell: pwsh
        run: |
          $version = (python release.py --print-version).Trim()
          $tag = "v$version"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.yaml broker/private/broker.py broker/__init__.py

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Version files already in sync."
            exit 0
          }

          git commit -m "chore(version-sync): $tag"
          git push origin HEAD:${{ github.head_ref }}
